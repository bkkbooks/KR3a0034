body:
  text: 原跋公是祖居在新喻之荻斜此書初未嘗有傳乾道八年諤客游豫章九月十日都運劉司業文見邀夜話偶出此為贈蓋蜀中善本得之甚珍留寄旅舍既而歸省復来二十六日道過臨江而使君江郎中叔源留飲富壽堂因語及之使君欣然即欲鋟版且云去替雖近亦當辦此十月一日至新吴即發篋封寄輒題于後庶他時知其来自司業劉公而使君主張名教不以秩滿行迫而猶切切于斯也郡人謝諤書溥来臨江乃先生鄉里二年間訪求其遺文而未能盡見既將去此乃得公是弟子記觀其微言篤論皆根柢孔孟而扶植名教醇於荀揚逺甚真有大功于聖門遂併工刻之以廣其傳凡是正十有六字其疑者闕之乾道壬辰十月上澣三衢江溥書右公是先生弟子記臨江劉子之遺書也前太守江公既刋是本不黯時在髙安得而讀之疑其頗有闕誤及到官同年友先生之從曽孫靖之子和又言之因取其家藏舊本校正果有百餘字而其從叔彭因椿復出一本尤精且詳子和本視之尚多舛脱如叔贛問尚書記人之功下脱五段梓慶削木為鐻至不敢以爵賞攖其慮下闕七段文勢差錯至不可讀其他以二段為一一為二者不可概舉蓋彭因本乃閣下善本雖子和亦未之見故也不黯既愛其精詳且受二君之請遂為正其訛謬増益其未備者更版凡十有八補字三百七十列之郡齋使學者得見全書而二君獲補完先世遺文之力豈不休哉淳熙改元孟秋朔玉牒不黯書
