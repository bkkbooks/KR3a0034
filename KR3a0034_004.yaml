body:
  text: 公是弟子記卷四宋劉敞撰王囘問曰堯命治水四岳薦鯀堯曰方命圮族然猶試之九年若是乎聖人之不愛民也劉子曰否奚謂此哉堯將以盡民心者也洪水方割浩浩懐山襄陵當是之時民猶倒懸也能釋是懸者民之望之猶父母也自四岳九牧天下之人以鯀為能釋之然而堯不用則是奪之父母也奪之父母而水不治天下之怨非堯尚誰哉聖人之政也務盡于民心而不以獨智知不使已負疑于天下為天下而非已也故賞而天下莫不從罰而天下莫不服愛民之至莫大于是劉子曰聖人神也神也者不見而形不言而知不行而速者也王囘曰然則聖人不可及乎劉子曰否其可及也者皆可及也其不可及也者則不可及已聖人之言有不可以智知聖人之為有不可以理推是皆天也獨聖人知天命之可以然可以不然王囘曰然則聖人不可知乎劉子曰否其可知也者皆可知也其不可知也者則不可知也已矣其神也其天也吾不知其可知而知其不可知矣王囘曰子之言聖人也太尊劉子曰然衆人之言聖人也太卑人有言曰琢圭玊可以為日月之明子必不信也琢圭玊可以為日月之形子必信之矣然則以圭玊為日月之明雖良工止焉以圭玉為日月之形雖拙工勉矣將卑日月以止良工乎髙日月以勉拙工乎王安石曰性者太極也情者五行也五行生于太極而後有利害利害非所以言太極也情生于性而後有善惡善惡非所以言性也謂性善惡者妄也劉子曰王子之言其謂人無性焉可已夫太極者氣之先而無物之物者也人之性亦無物之物乎聖人之言人性也固以有之為言豈無之為言乎是亂名者也王子曰人之性無善惡之稱彼善不善者情之成名也然則聖人無所言性可矣易曰乾道變化各正性命夫不以物為無性性為無善而以性為善或不得本者也如物也而無性性也而無善則乾尚何化而化尚何正之有夫言性而明其無性者不足以明性而固惑于有性者也説何以免此王子曰情生于性而有善惡焉善惡乃非性也往應之曰雛生于卵而有雌雄然則雌雄生于卵之前乎生于雛之後乎雌雄生于卵卵雖無雌雄之辨不可謂卵無雌雄也善生于性性雖未有善之動豈可謂性無善哉彼卵而無雌雄性乃可以無善矣歐陽永叔曰趙盾弑其君加之弑乎誠弑之乎劉子曰加之爾何以加之也曰不知賊之為誰而不得討可也知賊之起也而力不能討可也知賊矣力足以討矣縁其親與黨而免之是以謂之弑君也曰今有殺人者有司足以執之而不執也然則謂有司殺人可乎曰否不不君固非人之此也大臣之於其君豈有司之于其人乎君親之間聖人加焉後世猶亂况勿加也書曰議事以制此之謂也或曰契生于娀簡狄后稷生于姜嫄詩人以為天命之何也曰王者之興固然不已怪且神乎古之有是多矣惟不以怪而以為理是以聖人存之可得聞乎曰王者之興也其符絶人其徳絶人其功絶人三者參而王有其徳無其符無其功不能以王仲尼是也有其徳有其功無其符不能以王夏之益商之伊尹周之周公是也有其符有其徳有其功然後王夏商周漢皆是也故曰配天永叔問曰人之性必善然則孔子謂上智與下愚不移可乎劉子曰可愚智非善惡也雖有下愚之人不害于為善善者親親尊尊而已矣孔子謂子貢曰女與回也孰愈對曰賜也聞一以知二囘也聞一以知十然則其亦有聞十而知一聞百而知一聞千而知一者矣愚智之不可移如此深甫曰泰伯讓一國而曰讓天下何也劉子曰惟至徳者能以百里王天下能以百里王天下者雖未得天下能以百里讓是亦讓天下矣讓者推已之所能有而與人者也非其有而居之謂之盜非其有而與之謂之佻劉子曰教者所以明民也明民者其猶迷之有表乎一則得多則惑天下之表亦衆矣欲民之無惑難矣劉子曰道廢則士之為私議者衆而後有楊墨政亂則民之圖非福者衆而後有佛老庶之富之教之節之事非其方者恥之子思不去其親臣思不去其君天下安有不治乎人之議所親也則欺所賢也則囘所貴也則隨欺者私也囘者疑也隨者畏也君子雖私不欺雖疑不囘雖畏不隨故父兄之私諱而已矣聖賢之疑辨而已矣君上之畏直而已矣學不能至于自足者好為人師道不能至于自得者急言天下之憂士未可言而言者及其可言也或不言矣未可憂而憂者及其可憂也或不憂矣有利之心存焉君子不由也人自以為忠者衆而明于忠者寡人自以為仁者衆而至于仁者寡忠者以厚得之用力為下仁者以静得之愛利為下君子有過而無罪父子之親也君臣之義也朋友之交也骨肉之愛也君子過于厚不過于薄觀其過可以知仁矣劉子曰天地之運一動一静四時寒暑一進一退萬物一生一死一廢一起帝王之功一盛一衰祅異變化一出一没此皆理之自然者也惟聖人窮于理理者微而著隠而顯者也猶羿之射也在百步之外而不失秋毫射之理先盡矣子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也敢問其不可得聞何也曰神神也者不疾而速不行而至者也萬物之性未嘗同而聖人盡之剛柔也遲速也淺深也明晦也燥濕也應而不窮者也物固未嘗無性而性未必善也人之性善矣而未必能自知也學者能自知矣而未必能盡已也君子能盡已矣而未必能盡人也人之與人其類同仁人能盡人矣而未必能盡物也故可以聞者言也不可以聞者其所以言也永叔曰以人性為善道不可廢以人性為惡道不可廢以人性為善惡混道不可廢以人性為上者善下者惡中者善惡混道不可廢然則學者雖毋言性可也劉子曰仁義性也禮樂情也以人性為仁義猶以人情為禮樂也非人情無所作禮樂非人性無所明仁義性者仁義之本情者禮樂之本也聖人惟欲道之達于天下是以貴本今本在性而勿言是欲導其流而塞其源食其實而伐其根也夫不以道之不明為言而以言之不及為説此不可以明道而惑于言道不可以無言而迷于有言者也劉子曰君子小人之恥過也同欲善也同君子恥過而改之小人恥過而遂之君子欲善而自反也小人欲善而自欺也其斯所以異乎雖桀紂未嘗不自多以無過未嘗不好人之謂已善也吾以是驗之君子小人之恥過也同欲善也同所以異者微耳楊朱哭衢塗曰此夫失一舉足而差以千里者歟此之謂也永叔曰老子貴無為然則極老子之無為且將大不為國小不為家開口而哺仰人而食安坐徒處而已矣劉子曰非也貴無為者以其可以無不為也無不為者惟無為獨也此聖王之道仁人之守非老子之蔽知老子之蔽者其絶聖棄智絶仁棄義絶學棄禮號不可以教者也老子為柱下史矣未嘗以無為廢其職然則無為非所以廢職也舜耕而化陶而化漁而化賈而化知夫無為也故能屢化不夫無為也躓于物久矣劉子曰道莫大乎仁仁莫要乎一一者無不貫也無不載也一在内萬在外一之至貴賤貧富壽夭生死不見其異焉進退取舍動静語黙不見其二焉事有制者也禮有節者也言有物者也所以事者不出于制所以禮者不出于節所以言者不出于物乘夫無心以遊無欲大矣永叔曰何以謂復其見天地之心也劉子曰復者静静者天地之性也知静者非静之至也動而反于静也性静者静之至也未嘗知静而為萬物應故曰天地之心也永叔曰人之生也一生一死一覺一寐生動也而死静覺動也而寐静所謂静為復者然則天地之心死且寐也人之復死且寐歟劉子曰非此之謂也復静者言得一也得一者純粹積于胸中與物變化而不以外傷内者也非死且寐之謂也有人于此耳目聲色猶衆人也形體動作猶衆人也然而未嘗以外傷内未嘗以内隨外可以謂之動乎然則復其見天地之心可知也或曰召公為保周公為師相成王為左右召公不悦敢問召公之不悦何也曰疑其疑何也曰以周公為不可復三公之列夫既嘗南面而聴天下矣復子明辟又留而不去潔于節者不為夫周公之意以文武之道未之能大備備之者已而已矣是以北面就諸臣之位匔匔如畏然攝天子之位而不自以為泰反以三公處而不自以為少死則葬于成周聖人之忠也然則召公不知周公歟曰否召公相成王卜宅于洛率諸侯以幣見皆再拜稽首曰旅王若公曷為其不知周公也夫聖人神矣必有疑而後辨辨而後喻者非召公不足以動百姓之疑而喻其義則其疑也乃所以辨也其不悦乃所以歡也君子之為衆人固不知劉子曰無强重任强重任非其力必廢其任無歆重名歆重名非其實必毁其名劉子曰山林之士重生市井之庸輕生役于名者勞生得于徳者安生安生者家之謂孝子也國之謂忠臣也戰之謂勇士也教之謂賢師也學之謂良友也安生者非以生為安者也言達于性命達于性命者故能役于禮義曲而中肆而辨死而不貳待賞罰而為治者非正主也挟非譽而為義者非徳士也深甫曰無衣之詩晉武公之詩也晉武公兼有宗國則君子曷為美之君子之道固兼其宗國乎劉子曰否此之謂變風變風者變于正也變之中有美美之中有刺取其一節不兼其義谷風曰采葑采菲無以下體此之謂也無衣之詩其惠足以得民其智足以使臣其力足以兼國然而不自安也待天子之命然後安是之取爾也孔子曰齊桓公正而不譎非以其殺子糾簒齊國為正也以尊天子也劉子曰聖人之政吾非得親見之也而有禮存焉聖人之言吾非得親聞之也而有道存焉在于書者一是一非一偽一真吾誰與信然則吾且以禮觀政以道觀言乎三王之禮相變者皆其可得而變者也其不可得而變者猶若也夏足鼓商楹鼔周縣鼓謂之鼓之變可也以為變鼔矣則吾未之見不言不為者天也言而不為者君也言且為者臣也不言而為者民也四者有職而為為下矣雖有聖人之性顧而與衆同雖有無為之徳還事于事是以知聖人者鮮矣楊慥問曰仲尼稱顔淵不遷怒何謂也劉子曰中庸而已矣衆人之怒也出怒于怒故怒也是遷也已顔子之怒也出怒不怒出怒不怒者怒出于不怒者也怒出于不怒者有遷之者乎仲尼言其一端爾由是言之謂之不遷怒也可謂之不遷喜也可楊子曰何謂中庸曰中庸者中用也喜怒哀樂之未發謂之中發而皆中節謂之和此四物者君子不能不由焉然而中為之本矣有人也喜之不喜怒之不怒若是可謂中庸乎曰未也是其於智也達于道也偏偏則不徧是其過之者也然則喜之而喜怒之而怒喜怒不失其類則可謂中庸乎曰未也是其于名也察于情也節猶未免乎徇也是之謂不及然則奈何曰因于物縁于理彼其可喜也而喜之彼其可怒也而怒之其貌曲巧其變曲當物之制也理之有也而泊然無所于繫是中庸矣孔子曰中庸之為徳也其至矣乎民鮮久矣君子之道致乎至有曰不為無曰愈乎已矜小名以售大偽飾小亷以釣大利者惟鉅孱也何謂鉅孱鉅者齊之處士孱者魏之處士鉅以玊璧賂而顯孱以金錢貨而用以名處士則是所以為處士則非也公是弟子記卷四
