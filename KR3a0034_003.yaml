body:
  text: 公是弟子記卷三宋劉敞撰或問鄉飲酒之禮劉子曰所尚三德也年也爵也俎豆之事則人知之矣敢問三者兼乎曰然如何曰謀賓介于先生尚德也旅酬以齒老者異秩尚年也大夫為僎坐于賓東尚爵也三者天下之達尊也夫如是故觀于鄉者其一曰彼壯也而先老何也曰惟其德也然後民退而修德其二曰彼羸也而先富何也曰惟其長也然後民退而事長其三曰彼後入也而異席何也曰惟其貴也然後民退而貴貴故先王不賞而民勸不令而民從一事而三美備焉其惟鄉飲酒乎非聖主不能封建非封建不能長世善于義之為善也雖不利于已天下善之已亦善之而善安有不勸乎惡于義之為惡也雖利于已天下惡之已亦惡之而惡安有不懼乎安民也世祀也養已也君之不同也安民者無危世祀則有死矣養已者亦未之常存不以仁而為之不以不仁而不為上也以仁而為之以不仁而不為次也不知仁而為之仁不知不仁而不為不仁下也不以仁而為之不以不仁而不為者性也未始入于非以仁而為之以不仁而不為者智也畏乎不仁不知仁而為之仁不知不仁而不為不仁者出入也有幸矣不知仁而為之仁亦有不知仁而不為不知不仁而不為不仁亦有不知不仁而為之不知仁而不為亦有知仁而不為不知不仁而為之亦有知不仁而為之荀子不知性揚子不知命韓子不知道荀子言聖人之性以惡言聖人之道以僞惡亂性僞害道荀子之言不可為治揚子劇秦美新畏禍投閣苟悅其生而不顧義湯有夏臺文王有羑里周公奔楚仲尼畏于匡非其義貴之不受非其罪虐之不辭為畏而投與刑而死同為投而死與刑而誅異揚子之道不可以教韓子言聖賢者時人之耳目時人者聖賢之身耳司聞而目司見身然後安聖賢汲汲憂天下之憂明其義曰孔席不暇暖墨突不得黔數進不恥數退不怒不得出貴人之門為懼使天下學者矜于功名進于勢利墨道也古者士修其身鄉里不知朋友恥之朝廷不用有司恥之君子之行不由于人之所可賤是故不聘之女祭祀不為主不聘之士朝廷不為用韓子不知道可為具臣不可為大臣物莫靈于鑑案靈一本作鄰其守也一其應也博其居也以平以平為道者也春秋之誅也先意而後事其賞也先事而後意有其善無其功君子不賞也賞之弗信有其惡無其志君子不誅也誅之不服先意而後事是以刑不濫先事而後意是以賞不刑不濫賞不僭王道之盛也天之道有常人之道無常無常所以應有常也天之道無為人之道有為有為所以應無為也天之道不言人之道有言有言所以應不言也天之道無形人之道有形有形所以應無形也天之于人相反也其相反猶相徇也故聖人默而成之既已有為矣而謂之無為既已有言矣而謂之無言既已有形矣而謂之無形是莊老也非正名實之言也劉子謂楊異曰鼓舞鏗鏘吾不知其異于樂也然而知鼓舞鏗鏘而不知其義者是制氏之樂也折旋俯仰吾不知其異於禮也然而知折旋俯仰而不知其理者是徐氏之禮也簡牘筆墨吾不知其異于道也然而知簡牘筆墨而不知其道者是世俗之儒也故君子務本史之諱國惡非禮也晉人殺靈公董狐書之曰趙盾弒君趙盾曰嗚呼天乎盾豈弒君者乎董狐曰趙穿弒君而子不討賊弒君者非子而誰仲尼曰董狐良史也書法不隱故史之諱國惡非禮也曰然則春秋何以諱國惡春秋不足法乎曰春秋至矣史不足以當之孔子曰其事齊桓晉文其文則史其義則丘有罪焉故春秋至矣史不足以當之問瞽者之色白曰皎然黑曰黯然青曰蒼然丹曰赫然黃曰煴然問之其别不知也問聾者之音宫曰溫以厚商曰廣以廉角曰和以愈徵曰清以辨羽曰堅以微問之其次不知也問衆人之道仁曰博愛義曰禁非禮曰卑遜智曰通物信曰不欺問之其用不知也然則瞽者能得五色之名聾者能得五音之名衆人能得五常之名未足貴也貴道者貴其施之而不悖理之而皆得言之而不惑也非貴知其名也臨尸而不怍則可以為孝子矣天子之玊全上公厖侯伯瓚子男將貴者取純焉賤者取駮焉夫學亦猶是矣全而純者玊也次厖也次瓚也次將也石為下或問資于事父以事君君之使臣猶父之使子父之使子雖辱不辭雖勞不怨詩曰大夫不均我從事獨賢然則詩人怨乎劉子曰父子性也君臣義也父子內也君臣外也詩人之怨有使之然也故事親有慕而無怨事君有怨而無懟聖人行而當理非求當也自當也言而中律非求中也自中也或問吳充曰衛輒拒父則逆親不拒則廢命為衛輒宜奈何吳充曰合國人而聽之楊緯以吳充之言問劉子劉子曰否以謂聽于國人則公矣國人君臣也蒯瞶父子也君臣主義父子主親義無廢命親無絶屬與國人慮兄弟君天下不為也若之何與國人慮其親哉案哉一本訛作或且衛有君矣國人不忘其君輒忘其親乎堯有天下讓之舜舜有天下讓之禹堯舜之有天下也非無所命之也已而遷焉天下有非之者哉或問孟子曰舜為天下臯陶為士瞽瞍殺人則如之何孟子曰舜視棄天下猶敝屣也竊負而逃遵海濱而處終身欣然樂而忘天下故父子天性也孟子可謂知舜矣志近者聞逺則悲志小者見大則疑詩云憂心悄悄愠于羣小逢不善之謂也知性者不可惑以善惡知道者不可動以富貴知命者不可二以生死梁惠王問利國孟子知其非問財利也然而曰王何必曰利者利不可為號也齊威王問好樂孟子知其非好先王之樂也然而曰王之好樂甚則齊庶幾者樂可以為名也故號之不可傳者去之名之不可教者正之故兼愛為我絶學棄智之說君子弗聽或曰臧堅勇乎亷矣劉子曰是安得為勇且亷哉彼喪其衆而不死惑也恥一言而死之忿也且堅者惑忘其死忿忘其生者也勇者忘其死乎亷者忘其生乎或曰儒者無益於勝敗之數秦漢之勢原憲季次無益也曰然儒者無益于勝敗之數勝敗故不及儒者之治矣願大而不志于仁亂也好勝而不志于禮賊也行斯政也使天下之人服是王者之政矣出斯言也使天下之學者悅是聖人之言矣故王者之政服人心而聖人之言悅人性政莫大于得人心得人心者非夫得衆人之心得賢者之心也民之于賢也其動以為法其言以為政故賢者所就就之所去去之國未有不以是而存亡者也武王曰豫有亂臣十人同心同德自古莫盛焉武王之有天下朝諸侯猶反掌也此之謂得人心自信也故能使人信已自愛也然後可以愛人不自信雖然教人不行不自愛雖欲愛人僞矣或問克已復禮曰賢者就之不肖者勉之克已矣然則是仁矣乎曰純則仁駮則否一日克巳復禮而求仁焉天下孰能歸之不仁者有三殆富則見怨貴則見嫉有功則見疑三者非人豫也自豫也或曰黃帝堯舜垂衣裳而天下治蓋取諸乾坤何謂也曰無為而已矣天無為四時行焉地無為百貨出焉君無為百官治焉何為哉爵可貴也財可富也賞可勸也罰可威也中人也君子貴不待爵而重矣富不待財而厚矣善不待賞而勸矣過不待罰而沮矣然而貴貴焉富富焉賞賞焉罰罰焉中人之法也若夫貴富賞罰則非君子之事也苟可貴也則可賤也苟可富也則可貧也君子貴乎非貴賤乎非賤富乎非富貧乎非貧者也其動中禮其靜中仁斯已矣貴不為賤也貴有道富不為貧也富有禮是王者之臣也貴且為賤也術得行焉富且為貧也政得治焉是霸者之臣也貴為賤而已富為貧而已是敝國之臣必禍之勢也聖人有所不言而無不知也賢人有所不言而亦有所不知衆人有所不知而無不言所恥而不恥愚也非所恥而恥惑也有仁心而不施之政焉民不信也有仁政而不施之法焉後世弗徇也故君子有其心必見于其政有其政必著于其法或問百姓不親五品不遜不祥莫大焉瞽瞍以殺舜為事象從而謀之帝曽弗能禁乎劉子曰禁則誅誅則傷孝子之心聞屈子以伸父矣未聞屈父以伸子也詩云孝子不匱永錫爾類聖人受命於天賢人受命于聖人故聖人之命亦天命也子事親臣事君出于聖人者也是以問聖人者問其所為毋問其所以為問其所知毋問其必不可知子路是矣子路問鬼子曰未能事人焉能事鬼又問死子曰未知生焉知死故聖人有所不言也賢者有所不問也聖人所不言而言之雖辨弗聽賢者所不問而問之雖精弗復名者所爭也過者所匿也君子晦其名而衆不得蓋焉明其過而世不得非焉或問仁人曰仁人者死生無變乎已而况于富貴貧賤乎或曰若是則莊老何足異曰莊老也過仁人過乎哉孔子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也案此條一本誤分孔子曰以下另為一條或曰仁義禮智不若道之全劉子曰春夏秋冬别于天者也是以為時金木水火别于地者也是以為用使天不時地不用則無以知其大矣所謂道者固仁義禮智之名也仁義禮智弗在焉安用道人無為不祥也而後受其祥所謂不祥者少陵長不祥也賤干貴不祥也愚蔽賢不祥也强駕弱不祥也少陵長長亦或陵之賤干貴貴亦或干之愚蔽賢賢亦或蔽之强駕弱弱亦或駕之其類還至也今有變怪之物鬼神之事至于此則人必以謂不祥且有禍矣至于身不祥則莫之能察者不亦惑哉世之命仁也則愛而已矣奚足焉有所謂愛而不若其不愛奚以為仁哉仁者人也今指人之一體而言人可乎知一體之為人不知人之非一體也何以異于知愛之為仁而不知仁之非愛也孔子罕言仁曰曷為其罕言也曰不足言也其不足言何也仁者安之也非强之也知夫安之也何言哉孔子曰中人以下不可以語上也畏之斯師之矣樂之斯友之矣是故師之者雖死不倍其道誠以為是也友之者終身不二其義誠以為當也暫而言道必得輕焉强而言道必得爭焉輕爭之人不可以為師師無輕者也師無爭者也恃賞罰而為國不若其遺賞罰而不恃也君君臣臣父父子子苟為厚于義而薄于利賞罰無所用矣夫賞也者賢者所薄也不得已而居之罰也者小人所薄也不得已而用之劉子曰天地之神也待人而成功而况乎人之不及天地乎逺于利可謂士矣逺于利篤于學可謂士君子矣逺于利篤于學成于禮可謂仁者矣人之性善而自以為惡人之情正而自以為邪非情無性非性無善性之與情猶神之與形乎今夫盲者不能别五色聾者不能昭五聲非無聰明也形不使也人之所以去善而為不善者亦若此矣豈性不善哉情不使也因之謂性惡矣是亦謂耳目非善也夫盲者不夢盲而夢明俄然覺則盲矣聾者不夢聾而夢聰俄然覺則聾矣然則聰明非不存也物有蔽焉耳人之困于情亦猶是也或曰治國以刑名猶愈乎已劉子曰然天下大治則無所用刑上下分定則無所用名刑名者亂之資也小亂則解大亂則駭雖有刑名亦不得施矣夫懷之以仁義道之以禮樂逮其敝而後刑名繼之變未窮也劉子曰道之所以不明者三智者損之以就功賢者文之以便已學者析之以遂名故道之所以不明者三非小人不肖之過也凡在賢智而已矣古之為道者大而不損致而不文玩而不析有仕為天下者有仕為國者有仕為家者仕為天下者德合則見不合則隱仕為國者雖德未合有禮則留無禮則行仕為家者不謀人之軍不議人之國寵則辭之危則避之是皆君子之義也任輕而憂重勢疏而慮密其惟好亂之人乎劉子曰仕有三恥相時而為道者恥也希俗而為功者恥也飾義而為名者恥也劉子曰道諛有三飾人之意謂之鄉原伺人之色謂之籧篨服人之言謂之戚施士不修其方而游富貴者皆鄉原籧篨戚施之類也鸋鴂鳥之巧者也而常以其巢覆其宗鸋鴂之巧至于害而已矣夫智不知擇安危之處而美其宫室則亦奚以異鸋鴂之巧哉劉子曰有命必有性性者命之分也有形必有情情者形之動也劉子曰凡學志為本道次之文次之無其志為其道不立無其道為其文不傳或問明哲劉子曰自知之謂明知人之謂哲劉子曰郊以嵗始蠟以嵗終終始之義也三代共之劉子曰為君有患患不知人不患無臣為臣有患患不能治身不患不能治民故君必不知人然後無臣臣必不能治身然後不能治民知人有道也無以名妨實治身有道也無以逺謀近人自為正而國治耳劉子曰深于易者吉凶不待占矣此之謂知微劉子曰常事禮也變事權也堯禪舜舜禪禹湯放桀武王殺紂伊尹放太甲周公攝成王權也聖人仁人無所不用權惟聖人仁人然後可以用權為人臣者不可以不自重也食而廢事君雖弗誅則犬豕畜之媚而廢節君雖弗誅則倡優畜之妒而廢能君雖弗誅則婢妾畜之巧而僥幸君雖弗誅則冦竊畜之此四者非君豫其名也自豫之也或問子罕言利與命與仁何也曰利非所以為號也命非所以明教也仁非所以常道也利為號必失所以利命明教必惑所以教仁常道必輕所以道自外至者無主不止自內出者無匹不行孔子曰可與言而不與言失人不可與言而與之言失言吾未見好仁者惡不仁者蓋有之矣我未之見也案以上二條一本誤連為一條功名之說立則道德微古之君子以道事上以德畜下勝國而非謀也富國而非利也齊衆而非刑也克敵而非力也凡在道德是故竒變之巧矯僞之行君不以賞于朝士不以教于國史不以書于冊君使臣報也臣事君報也君人報其德臣人報其食報也者報其直者也直者天下之公也薄施而厚報之君子不為工尹商陽是也厚施而薄報之君子不可豫讓是也射者勝而飲慶也下而飲罰也于飲酒而有恥焉故刑可以不用也禮者幣之質也自我往者緣其質以出其文自外來者緣其文以觀其質聖人之所言吾有不達而無有非聖人之所為吾有不知而無有疑聖人受命于天賢者受命于聖公是弟子記卷三
