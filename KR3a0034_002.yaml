body:
  text: 公是弟子記卷二宋劉敞撰或問曰太公治齊尊賢而尚能周公曰後世必有篡奪之臣周公治魯尊尊而親親太公曰後世寖弱矣若是乎聖賢之無益于治亂之數也曰否此非聖賢之語也致功兼并者文其過之言爾齊不用太公之法故齊奪魯不用周公之政故魯弱尊賢尚能非所以啓篡也尊尊親親非所以致弱也齊桓公修太公之法而霸天下魯僖公修周公之政詩人頌之以比三王惡在其無益于治亂也或曰人有言太公封于齊五月而報政伯禽封于魯三年而報政周公喟然歎曰嗚呼魯後世其北面齊乎夫政不簡不易民不有近平易近民民則歸之信有諸乎曰否此非周公之語致功兼并者欲速之言耳孔子曰無欲速無見小利欲速則不達見小利則大事不成古之人豈不欲簡易哉又惡欲速速非所以簡易也簡易者未嘗速也民之為道信而後可使富而後可教安而後可保此所以為達也三年之為亟矣齊先魯亡何魯之北面哉孔子曰齊一變至于魯魯一變至于道吳起可謂知戰矣親與士卒最下者同其勞苦曰是何足以言知戰也子見夫乞人乎叫號偃仆乎康莊之間其聲可哀也不若是不足以濟其身若乃家丈人者五十可以衣絲七十可以食肉子孫者奉之爾父母之仇不與共天下兄弟之仇不與共國非虛加之也然後稱于人情視民如子者民報之如父視民如弟者民事之如兄無所仇云爾有則爭先致力焉子弟豈待父兄與已均其苦然後為用哉故用民者矯之以身徇之以愛濟之以術苟一時之勝而已矣惡可以久哉詩曰服其命服朱芾斯皇八鸞鏘鏘道上不失度下不失節也駕彼四牡四牡騤騤君子所依小人所腓君子之所依而小人以為已腓安在其毁上下之節哉或曰仁者壽顔淵何以不壽曰死生命也非人之所益然則仁者壽非君子之言乎曰固君子之言也所謂壽者言無以增其年而已矣通是道者內自得于心雖殤子猶彭祖也有言彭祖而非壽者乎請問知者樂曰通是道者內則得于心雖窮居猶南面也烏有南面而非樂者乎請問仁智動靜曰誠而明之靜也明而誠之動也孔子曰顔氏之子其殆庶幾乎不遷怒不二過案此條一本誤分孔子曰以下另為一條君子之事君也諫不用則去諫不用而去者道也先其未亂也見亂而去是逃也死之可也君子之不去其君也不忍也何不忍也曰不忍其君之無與為善曰庶幾乎若此哉故不聽則諫不已其有利之之心焉是貪也非不忍也子以四教文行忠信文所謂文學也行所謂德行也政事主忠言語主信君子之不言利也惡其號也曰利于已不可言也利于國利于天下不言不亦病乎曰天子之有天下猶諸侯之有國諸侯之有國猶大夫之有家大夫之有家猶庶人之有室大者治大小者治小云爾非異物也利之天下則謂之公利之家則謂之私利之國則謂之亷利之室則謂之貪是亦不知類也詩云爾之教矣民胥效矣上之所貴而下為之則善事上也上之所貴而下不為之則不善事上也欲治民而責其善事上非也責其不善事上而惡其效已于利難矣如惡之也則莫若不言利君以人為天人以君為天天以人為天人之所歸號之曰天與之人之所去號之曰天奪之非君以人為天歟君安之則安富之則富生之則生死之則死非人以君為天歟世治人曰天也世亂人曰天也天非實治之也天非實亂之也有曰治有曰亂者非天以人為天歟君子畏幽則小人畏明君子畏明則小人其無畏矣詩云憯不畏明性者受之天也道者受之人也受之天者已雖欲易之不能易也受之人者人雖欲易之不能易也魚不可使去淵鳥不可使去林天也出處語默隱顯之不齊人也有所受之矣言而無當猶漏巵也形具而已矣聖人無可無不可賢人有可有不可衆人適可適不可聖人曰懷之賢人曰擇之衆人曰所遇而已矣誠於中者其受言也不惑不惑然後知言知言然後知人權所以濟義也非義無所用權為義者聽民民之所徇因以濟之堯舜禪湯武伐義也人君誠有畏天之心雖有災害不殘及其無畏天之心雖有災害殘矣人君誠有恤民之心雖有災害不畔及其無恤民之心雖無災害離矣故天之所享誠也氏之所保誠也誠之至不言而喻不施而惠不禱祀而福是以人道貴忠也三王肉辟有諸曰有之不已慘乎曰秦漢則慘三王則否井田以均之鄉黨以安之學校以教之示之以禮動之以義惠之以仁竒邪之行無自習焉荒鄙之聲無自聞焉淫佻之色無自見焉上下察矣逺邇一矣然而附于辟者衆所棄也奚其慘非聖王不能用肉刑秦漢之用肉刑暴矣慘其末乎漢文之革不亦宜乎人胥知行之由足不知行之由目人胥知視之由目不知視之由心人胥知生之由食不知生之由道三者異類而同義如使人之行者莫如足也則瞽者曷為有所不行也如使人之視者莫如目也則念者曷為有所不見也如使人之生者莫如食也則不義之食曷為有所不生也生之依道視之依心行之依目此天理之自然者也知行之待目而不知生之待道則外其生于道矣夫外其生于道者生而不以道者也生而不以道者猶行而不用目其不陷于坑谷者幸而已矣臨大事而不懼守大節而不可奪詖言不入偽言不出其惟知道者乎君子貴曲能有誠曲能有誠者藝之上也而况直而誠之誠而明之者乎梓慶削木為鐻不敢以毁譽觸其心不敢以爵賞攖其慮七日鐻成而若神梓慶可謂知用巧矣有為者亦然今之懷道者假譽于仁邀賞于義故弗成也器而弗成猶毁瓦也事求可功求成何如曰不可事求法功求義法而不可者有矣義而不成者有矣未有不法而可者也未有不義而成者也君子之道不出于中中者所以并容也賢者守焉不肖者勉焉并容所以為大也決絶之行君子不為舜在深山之中伊尹耕有莘之野説築傅巖之野亦憂天下乎曰不憂也奚為不憂賢者之生于世也世亂固坐而視之乎曰天子憂天下諸侯憂其國大夫憂其政士憂其職庶人憂其業天下已定矣非其憂而憂之亂也天下固亂而又亂之是以使天下多事也詩云職思其憂君子豈無所憂哉亦思其職而已矣或問舜伊尹傅説之職曰舜職其孝伊尹職其耕説職其築或問孔席不暖有諸曰有之矣其皇皇也曰聖人以其皇皇為道衆人以其皇皇為利或曰為道固皇皇乎曰迎之致敬則就之言不行諫不用則去之不皇皇何為佛肹以中牟畔召孔子孔子往孔子不惡其畔歟曰惡之惡之曷為往也曰人之于仁也無必不為其于不仁也亦無必為知賢而召之也非知仁歟知仁也不足與為善歟知仁且為善畔可使復合危可使復安亂可使復平亦何為不往哉或問君子疾沒世而名不稱使傅説死于胥靡末如名之何矣亦疾之乎曰君子之名有不幸而不稱無幸而稱小人之名有幸而不稱無不幸而稱其疾之也在已其稱之也在人君子能知其必疾也而不能知其必稱也奚疾之哉或問誠曰誠者成也成物者也不成物非誠也何謂物曰君子則德小人則事德莫若修事莫若敏二者其誠乎揚子雲曰賢者為人所不能為揚子亦安知禮哉夫賢者為人所能為而已矣人所不能為賢者不為也或問君子矯乎曰惟君子為能矯君子之矯以為義也小人之矯以為利也君子窮而益堅小人達而亦偽富而無以為道也則辭富貴而無以為道也則辭貴生而無以為道則舍生惟仁者能之或問伊尹比乎妹喜以滅夏膠鬲比乎妲己以滅商有諸曰否此非智者之言也桀為無道嬖妹喜而殺其良臣棄先世之典而絶百姓之命百姓弗堪伊尹為是相湯以滅夏放桀于南巢紂為無道嬖妲己妲已之所悅而爵之所惡而殘之殺比干以遂其怒百姓弗能忍武王為是伐紂而殺之當是時膠鬲諫而不入使之問師期期後武王趨而救之猶紂臣也吾聞得天下者得其民心者也有天下者不利天下者也如湯武因人之嬖以取其國是利之也何以為湯武鄭穆公將伐胡則妻之句踐有吳之怨入西子焉夫搆人于禍而後殘之陷人于危而後幸之此不仁者之所為也而謂湯武為之乎太上無文其次有而不恃其次恃之而治其次治之而不足恃君子有四擇擇術然後學之擇師然後傳之擇交然後親之擇君然後事之是以君子有終身之憂無一朝之患也施而不報者吾未之見也廟堂之上獻以爵酬以觚一獻而三酢民猶以為薄故君不可以弗厚施也治國家天下者去利之心而已矣國君過市有罰夫人過市有罰命夫命婦過市有罰徒過之而已矣猶曰不可况親利之者乎禁過于微則人樂遷善防患于小則患逺矣或曰禮齒路馬有誅以足蹴路馬芻有誅不已亟乎曰是所謂逺其防者也路馬者君之路馬也路馬之可敬况其君乎是以國家之敗常必自其小者始焉民無嚴君之心則無為貴禮矣成民而後使之則無怨民教民而後用之則無失人犬馬之勞不可棄也厚之至也禮也者大為之為其小也逺為之為其近也厚為之為其薄也深為之為其淺也謹為之為其怠也此之為禮之情知禮之情者所以作禮也過而能知知而能改上也過而不知知而能改次也既不能知又不能改下也衡平也故準之繩直也故度之鏡明也故監之君子成德以待物至也輕重出焉曲直決焉醜好分焉誰能蔽之哉委巷之禮小人悅之君子恥行焉先王之禮君子悅之小人恥行焉詩云彼醉不臧不醉反恥行不由先王之禮猶醉也惟君子能忍是恥也詩云憂心悄悄愠于羣小吾乃今知禮之為貴也用于未亂而不用于已亂臣弒其君子弒其父則揖遜為之詬矣學所以為已也推而及人仕所以為人也推而及已推而及人故不以人害已推而及已故不以已害人君子之得其時者將以行其道也道不行猶為不得時也叔孫通制漢禮得其時矣君子恥之者以道不得行也或曰子三年無改于父之道若其不善也亦無改乎曰否改其惡無改其道謂之道矣若之何改之三年不改焉雖終身不改矣信善者毁譽不能惑也毁譽不能惑也則信善已乎曰未也貧富不能易也貧富不能易也則信善已乎曰未也貴賤不能動也貴賤不能動也則信善已乎曰未也生死不能誘生死不能誘則幾于至矣雖至乎至者蔑以加矣文王謂武王曰我百爾九十吾與爾三焉聖人固能與人壽若此乎曰否不然也昔者武王既克商有疾諸大夫懼請穆卜于先君周公于是為壇請命于文王卜之以三王之龜而吉書曰王翼日乃瘳復三年王乃崩世以為文王與之也是以傳于此言也聖人不能以其壽與人也士可使見義不可使見利民可使見德不可使見刑齊無知弒襄公孟陽死于牀石之紛如死于階下崔氏弒莊公莊公臣死者十人晏子端委立于門外莫之死亦莫之亡四民異業而莫不相悅者職分均也案莫不相悅一本作莫相悅制度不定雖殫天下之富其求不給富貴不可矜也富貴而攻之者衆以其可矜譬如明珠于千仞之淵沒人取之莫善乎性人之學求盡其性也學而不能盡其性有之矣未有不學而能盡其性者也性猶弓也學猶力也雖有千鈞之弓引之弗滿弗能貫也豈弓力為有不足哉所以用之者不足也上之治下職也下之事上亦職也上不能治下則昏下不能事上則亂亂則喪身昏則喪位其事一也孔子之教人也猶量也豆區釡鍾因其能容放乎足而止五帝之治翼翼如也三王之治兢兢如也危國者必自暇亡國者必自佚詩曰彼昏不知一醉日富違禍如水火猶有及焉去辱如溝隍猶有隕焉不早辨故也無日不違無日不去則何悔吝之有詩云不敢暴虎不敢馮河人知其一莫知其他一近而他逺也世有道則其民質其士貴其鬼神世無道則其民巧其士賤其鬼不神舜之受天下也禮辭禹之受天下也固辭益之受天下也終辭非苟降殺也時也聖人從時進莫若讓勇莫若義貴莫若仁富莫若廉民可刑也而不可辱可懼也而不可怒可親也而不可怨或問公孫𢎞兒寬以儒術飾吏事何如曰巧矣不有毁也其能飾乎或曰與其莫用飾不亦近乎曰君子逺之為道小人近之為利苟可飾也奚往而非義也為義而飾民進于偽偽實害德百度昏矣其有不佻乎詩曰其維哲人告之話言順德之行其維愚人覆謂我僭民各有心非德之順而心是制民各有心何上之有民之情也凌上其性也好德禘帝也不王不禘虞夏禘黃帝商周禘嚳皆帝也諸侯不敢祖天子不敢祖天子則亦不敢禘故魯之禘非禮也公是弟子記卷二
