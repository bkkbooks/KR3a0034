body:
  text: 公是弟子記儒家類提要臣等謹案公是弟子記四卷宋劉敞撰敞有春秋傳已著録是編題曰弟子記者蓋託言弟子之所記而文格古雅與敞所注春秋詞氣如出一手似非其弟子所能故朝公武讀書志以為敞自記其問答之言當必有據也公武又稱書中於王安石楊慥之徒書名王深甫歐陽永叔之徒書字以示褒貶今考公武所說亦大概以意推之即如王回一人論四嶽薦鯀一條論聖人一條則書其名論泰伯一條論晉武公一條則書其字是於褒貶居何等乎且其書固多攻王氏新學而亦兼寓針貶元祐諸賢之意故其言曰淫聲出乎律吕而非所以正律吕也小道生乎仁義而非所以明仁義也又曰八音不同物而同聲同聲乃和賢能不同術而同治同治乃平又曰忘情者自以為達悖情者自以為難直情者自以為真三者異趨而同亂又曰學不可行者君子不取也言不可用者君子弗詢也又曰智不求隱辨不求給名不求難行不求異又曰無為而治者因堯之臣襲堯之俗用堯之政斯孔子謂之無為也又曰夫賢者為人所能為而己矣人所不能為賢者不為也又曰君子恥過而欲改之小人恥過而欲遂之君子欲善而自反小人欲善而自欺又曰矜小名以售大僞飾小廉以釣大利者惟巨孱爾蓋是時三黨交訌而敞獨蕭然于門戶之外故其言和平如是至于稱老子之無為則為安石之新法發辨孟子之人皆可以為堯舜則為安石之自命聖人發其說稍激則有為言之者也又王守仁謂無善無惡者性之體有善有惡者意之用明人齗齗辨正稱為衛道今觀是書乃知王安石先有是說敞已辭而闢之是其發明正學又在程朱之前其或謂仁義禮智不若道之全一條謂道固仁義禮智之名仁義禮智弗在焉安用道亦預杜後來狂禪之弊所見甚正徒以獨抱遺經淡于聲譽未與伊洛諸人傾意周旋故講學家視為異黨抑之不稱耳實則元豐熙寧間卓然一醇儒也其書宋時蜀中冇刻板乾道十年豫章謝諤得之于劉文濬付三衢江溥重刋淳熙元年趙不黯又于敞從曾孫子和及子和從叔椿家得二舊本較正舛脫就江本改刻十八頁補三百七十字此本即從不黯刻抄出者末有諤溥不黯三跋證以永樂大典所引一一符合知為原書亦可謂罕覯之笈矣敞墓志及宋史本傳俱稱弟子記五卷讀書志則作一卷蓋南宋之初已病其繁碎合併為一今以篇頁稍多釐為四卷以酌其中又錢曾讀書敏求記載極沒要緊一卷注曰即劉原父弟子記也考浙江取進遺書有極沒要緊一卷亦題公是先生撰其文皆採掇郭象莊子注語似出依託與此顯為二書今别存其目于道家中庶真贋不相淆焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
