front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0034_WYG_001-1a, image: WYG0698/WYG0698-0441c.png}
body:
  text: 公是弟子記卷一宋劉敞撰劉子曰四十而仕為不惑也五十而爵為知命也不惑然後可以為士知命然後可以為大夫兼近四隅不失其所者中是也并總萬物不失其元者一是也明徳制義不失其方者禮是也禮者道之中也教人以道云乎豈曰教人以文云乎道者文之本也循本以求末易循末以求本難今之所謂作者筆墨焉爾簡牘焉爾君子之謀也盡下而用其所長不以已奪人故曰功成而已矣事立而已矣衆人盡其慮而君子受其名道之勢似迂闊道之文似詭偽道之情似剛狷勢無迂闊則鄙文無詭偽則野情無剛狷則蕩舜作九招九招者九名也予識其三焉祈徵角之謂焉天可順而不可恃也鬼神可敬而不可諂也廟中其至矣百官備萬物具案物一本作事不言而事行無為而功立齊一變至於魯魯一變至於道春秋變魯之實也修已以安人治天下其猶作樂乎作樂者備八音八音不同物而同聲同聲乃和治天下者進賢能賢能不同術而同治同治乃平是故樂之和一物不得主焉天下之平一賢不能名焉政莫美于簡易何為而可曰繁矣而後求簡焉難矣而後求易焉簡之而簡者繁不可如何矣易之而易者難不可如何矣儒者之原仁義也樂工之本律吕也本律吕者衆而知律吕者寡原仁義者衆而通仁義者寡律吕之所以亂淫聲亂之仁義之所以毁小道毁之淫聲出乎律吕而非所以正律吕也小道生乎仁義而非所以明仁義也善治聲者擇乎律吕善治道者擇乎仁義天下之道莫大乎學莫貴乎學夫學者匹夫也而居聖人之業可不謂大乎匹夫也而言王者之事可不謂貴乎案以上二條一本誤連為一條聖人辯必能窮萬物而不言智必能兼萬物而不為不言者有所止之不為者有所因之君人議道有司守法君人議道故議道者君人之徳也有司守法故守法者有司之器也古所以治者當其分也古所以亂者違其分也當其分而勸違其分而競勸則事立競則怨作關雎樂而不淫哀而不傷何謂也曰徳之至也窈窕淑女琴瑟友之樂也不淫其色悠哉悠哉輾轉反側哀也無傷善之心此之謂也古之教者言不足而徵徵不足而諭諭不足而類類不足而辯古之君子言而已矣辯其末也天有常運也地有常勢也人有常性也物有常理也是故天地始者由今日知之萬世後者由今日知之雖有至愚之人而不疑于天不惑于地審必然也審必然則不可敓以辭不可敓以辭者衆人皆然而君子為甚是故聖賢之事出于上古者雖甚逺必有以信之雖甚幽必有以明之雖甚繁必有以詔之雖甚亂必有以治之書所以紀逺而書未必盡信也信有理言所以交近而言未必盡聴也聴有理故信理者不惑于書聴理者不惑于言不惑于書可以為師不惑于言可以為友漢武帝好馬而余吾渥洼為之出馬葉公好龍而龍亦下之髙宗好賢恭黙思道夢帝賚以良弼此皆可以謂篤好之矣柱厲叔事莒敖公不見用而死其難曰吾以羞後世不知臣者狼瞫黜于晉不肯為亂而死國事亦以使上知也不肖之君諱言死亡秦人不敢言死衰宋之主怒言白也趙王殺其良將李牧而作山木之謳項羽既敗悲歌慷慨泣下沾衣李斯就戮東市嘻吁感動使彼早自警安有此患哉齊靈公淫于崔氏崔氏殺之將死曰請自刃于廟楚成王求食熊蹯而死趙武靈王梁武帝探鳥鷇而食胡亥曰願為黔首皆不忍平居為善而希望須臾之生楚靈王聞諸公子被殺自投車下曰予殺人子多矣能無及此乎商君設法殘民及死之日歎曰為法之敝一至此乎使此兩人幸而免猶自以為行之是也楚荘王曰吾以不祥道民則災及吾身桀紂可與為善哀平不可與圖存非桀紂優也時勢失也武王戎車三百兩虎賁三百人而誓司徒司馬司空此三卿三軍也諸侯以百乘為軍不以萬二千五百人為軍下天子也以百乘為軍者一乘凡八十家家出一人其中步卒七十二人甲士三人其餘以為厮役扈養者凡一乘則一右右皆虎賁勇士也故武王戌軍三百兩則虎賁三百人漢武帝初好兵事征伐故衛青霍去病李廣楊僕諸酷吏皆為用及後悔之封丞相為富民侯而捜粟都尉趙過平都令光更以務農重穀進天下亦翕然賴之此一君之身終始相反如此而隨其取捨輒皆得人外則伸威四海内則安養百姓世豈乏士哉常患人主不求也禮不以近人為達樂不以易備為樂事不以便用為利味不以爽口為美行之似迂逺作之似疎拙居之似愚朴安之似淡泊化民成俗俗既已成偷偽者不能入物謂之命生謂之性道謂之情情者聖人所貴也詩書禮樂所由作也仁義忠信所由顯也五帝三王所以有其人民也忘情者自以為達悖情者自以為難直情者自以為真三者異趨同亂不可以為王霸之民哀公問弟子孰為好學孔子曰顔囘季康子問弟子好學子曰顔囘好之者樂之也十室之邑必有忠信如丘者焉不如丘之好學也此聖人之好學也齊桓欲用管仲求之于魯魯施父曰不如殺之衛鞅為秦伐魏破魏師魏安釐王曰吾悔不用公叔痤之言以誅鞅也夫不忍克已為徳而謀害人之臣猶竊鈴掩耳也智止于自欺而已教民者禮樂為急非謂三王之禮五帝之樂也時禮時樂禮諭其制樂諭其功百姓鼓之舞之而不敢叛焉教民以學為将行之也試人以言為將用之也是故學不可行者君子弗取也言不可用者君子弗詢也書曰無稽之言勿聴弗詢之謀勿庸智不求隠辯不求給名不求難行不求異推鬼神虚無詭聴易視乘人以缺如此者執而殺之民難聚也而易散難安也而易危聚之有道安之有術不出于人情而已矣叔贛問曰尚書記人之功忘人之過春秋収毫毛之善貶纎芥之惡二者無異乎曰無異何謂無異也曰忘其過不忘其惡貶其惡無貶其過仁義禮智信五者霸王之器也愛之而仁利之而義嚴之而禮謀之而智示之而信之謂霸仁不待愛義不待利禮不待嚴智不待謀信不待示之謂王王者率民以性者也霸者動民以情者也性者莫自知其然情者如畏不可及王者百年而立百年而備百年而裕百年而衰百年而踣有過之矣霸者十年而立十年而備十年而裕十年而衰十年而踣有不及矣率人以教人其政乃純率人以事神案此句人字一本訛作神其鬼乃神政之不純教之過也鬼之不神事之過也教人過于觳事神過于瀆民不見嚴而煩是䙝非瀆乎案此二句有脱佚字古之事神者必有則弗徵弗徵民弗信也必無則弗畏弗畏民弗從也事神若疑故筮則弗非盟則弗叛禱則壹齋則潔言則信令則從居則謹行則順郊則見帝廟則見先王奥則見主而誰職思亂任天下之憂者相天下者也苦天下之重者君天下者也任天下之憂者非憂敗也言以已為天下法苦天下之重者非實可苦也言富貴之非已伊尹非憂天下任天下之憂者也故舉于畎畝而相湯舜禹非樂天下苦天下之重者也故受天下禪也古之君子為義于其學為功于其業義非其學雖刑不避為政者有以徇之而勸事師也功非其業雖賞不就為政者有以置之則勸事君也事師貴一事君貴一一之外毋敢動其心人人一以事師人人一以事君天下治矣義非其學雖刑不避者誰歟曰若齊景公虞人魏絳欒氏之臣是也功非其業雖賞不就者誰歟曰若董安于屠羊説者是也五經者五常也詩者温厚仁之質也書者訓告信之紀也易者淵微智之表也春秋褒貶義之符也惟禮自名其道専也利已者亡利民者霸能以美利利天下不言所利者王君臨臣喪以桃茢先非古也周之未造也古者教民不倍死臣已死君不忍呼其名事師者北面言臣之也就養無方死則為三年之服言子之也故受道焉不敢倍倍之者君不以為臣士不以為友故善事其師者必善事其親善事其親者必善事其君故人君莫不欲其臣之善師也故立師保之官人父莫不欲其子之善師也故易子而教孟子曰人之性善人之性皆可以為堯舜孟子可謂言過其實矣人之性善且有上有中有下于上也又有上焉于中也又有中焉于下也又有下焉九品也故上者聖中者君子下者有常不及乎聖而為仁不及乎君子而為善不及乎有常而為齊民故性不同也而善均善不同也而性均故人不可以為堯舜猶堯舜不可為人也壽莫如召公不能至乎聖而止天莫如顔子亦不能至乎聖而止使召公而天使顔子而壽其材亦若是而止矣此性之不可過也人何可為堯舜哉故開難到之期者人不能信也人不能信者學不能益也古之教者詩書禮樂至仲尼益之以易春秋樂自此沒矣禮者徳行之本也詩者言語之本也書者文學之本也春秋者政事之本也此四本者君子之所盡心也聚無功之人者乏百姓之食也地不加闢而賦粟倍民不益進而廪餼廣貧則不能富也流則不能止也殍則不能救也此率人而使食人也人相食則不祥莫大焉子曰參乎吾道一以貫之曾子曰唯門人問曾子曾子曰忠恕而已矣施之已曰忠施之人曰恕聖人之功與人同也聖人之徳與人同也聖人之性不可及也聖人之功不過治人聖人之徳不過治身聖人之性不行而至不疾而速惡可及哉孔子曰十室之邑必有忠信如丘者焉是故舉功徳以言聖人者其由不知聖人者也有材而不知道材非其材也有功而不知道功非其功也古者祭蓋必有配配必有尸尸者人道也非祭人則無尸天子七廟二王後六廟諸侯五廟孤卿四廟大夫三廟上士二廟官師一廟故生異宫者祭異廟也孔子曰無為而治者其舜也與如何斯可謂之無為矣曰因堯之臣襲堯之俗用堯之政斯孔子謂之無為也正朔無所改制度無所變教令無所易恭已正南面而已矣孔子曰巍巍乎舜禹之有天下也而不與焉王者承極敝之後者則新之改正朔以新其時也異徽號服色以新其目也殊聲音律吕之變以新其耳也一制度法令以新其俗也非所謂無為也孔子曰唐虞禪夏后繼湯武伐其義一也不王不禘非諸侯不祫祫及其壇墠禘者禘其祖之所自出以其祖配之而及其夾室廟有二昭漢之失禮也古者一昭一穆非學之難知所學之難也非所學之難知道之難也非知道之難知行道之難也知所學者亦鮮矣知道者吾未之見也譬知道者其猶止水乎止水能盡物之形此之謂一以貫之商賈有千百之利則勤農夫有終嵗之食則勉是其樂之者也為道者亦然苟得其樂終身不厭苟為不得終身愁苦亦勤之而已矣如商賈之謀富農夫之望嵗安有不及哉詩曰如匪行邁謀是用不得于道今之為學者多若此勿為名則名隨之勿為利則利隨之故學者去名利之心而已矣徳之親民甚于子孫子孫天性也服有時而殺廟有時而遷至于徳或累十世民悲思享嘗之詩曰豈弟君子胡不萬年賓之初筵飲酒之禮也古者非祭祀不飲酒不至于醉書曰庶國飲惟祀徳將無醉秦之亡不亦宜乎多為利者大夫則君之婦人則客之以是教其民焉民是以共利之為政者慎所以導民導民于善其報亦善導民于惡其報亦惡詩曰爾之教矣民胥效矣莫之為仁者而謂之不可為猶莫之行而忌逺也熊蹯之美不食則不知其美知熊蹯之美者必其食之者也先王之禮其猶熊蹯乎庶子為後為其母不敢貳尊者也庶祖母之喪三年非禮也吾未之聞也聖人之治天下結之不以恩惠威之不以刑罰不為而治者民自治也一曰宗族二曰師友三曰賓客四曰祭祀五曰喪紀所謂命者道而已矣生死貴賤貧富道之制也君子以為命所謂天者人而已矣人歸之則為諸侯諸侯歸之則為天子人之制也非已制也君子以為天知道者其知命也知人者其知天也孫不後祖故有嫡子無嫡孫嫡孫者繼嫡子者也為嫡子三年為嫡孫朞祖不以孫為後也祖不以孫為後孫亦不敢後祖也然則孰後後嫡子嫡子死有子則廟廟則以昭穆治之無子則不廟不廟則不以昭穆治也孫後祖者惟始封君及始為大夫之嫡子前死者子未為後其孫代之于是乎為祖三年後者後宗廟也庶子不為長子三年言不為後也禮曰祖卒然後為祖後者服斬此之謂也公是弟子記卷一
